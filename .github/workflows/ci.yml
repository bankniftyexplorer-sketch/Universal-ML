name: Institutional Verification Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"

    - name: Sync dependencies
      run: uv sync --locked

    - name: Enforce Strict Code Formatting (Ruff)
      run: uv run ruff format --check .

    - name: Static Analysis Quality Gates (Ruff)
      run: uv run ruff check .

    - name: Syntax Pre-Compilation Baseline
      run: uv run python -m py_compile universal_ml_engine.py daily_ml_engine.py backtest_engine.py daily_backtest_engine.py live_inference.py meta_strategy_selector.py accuracy_guardrail.py julia_bridge.py
